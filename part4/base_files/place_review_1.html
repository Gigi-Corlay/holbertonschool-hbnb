<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB Reviews</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>

<section id="add-review-1" class="mb-5">

    <!-- Title -->
    <div class="mb-4">
        <h2 class="mb-1">Reviews</h2>
        <p class="text-muted mb-2">Sorted by: Most relevant</p>
        <hr class="border-secondary-subtle">
    </div>

    <!-- Review 1 -->
    <article class="review-card col-sm-6 py-3 border-bottom border-secondary-subtle">
        <div class="d-flex align-items-start">
            
            <img src="images/profil_1.png" alt="Profile picture of Jane Smith" class="review-avatar me-3 rounded-circle">

            <div class="flex-grow-1">
                <h3 class="mb-1 fw-bold">Jane Smith</h3>

                <div class="mb-2">
                    <i class="bi bi-star-fill text-dark"></i>
                    <i class="bi bi-star-fill text-dark"></i>
                    <i class="bi bi-star-fill text-dark"></i>
                    <i class="bi bi-star-fill text-dark"></i>
                    <i class="bi bi-star-fill text-white"></i>
                </div>

                <small class="text-muted d-block mb-1">
                    5 years · 3 weeks ago · Stayed a few nights
                </small>

                <p class="mb-0">
                    Great place to stay!
                </p>
            </div>
        </div>
    </article>

    <!-- Review 2 -->
    <article class="review-card col-sm-6 py-3 border-bottom border-secondary-subtle">
        <div class="d-flex align-items-start">
            
            <img src="images/profil_2.jpeg" alt="Profile picture of Robert Brown" class="review-avatar me-3 rounded-circle">

            <div class="flex-grow-1">
                <h3 class="mb-1 fw-bold">Robert Brown</h3>

                <div class="mb-2">
                    <i class="bi bi-star-fill text-dark"></i>
                    <i class="bi bi-star-fill text-dark"></i>
                    <i class="bi bi-star-fill text-dark"></i>
                    <i class="bi bi-star-fill text-dark"></i>
                    <i class="bi bi-star-fill text-dark"></i>
                </div>

                <small class="text-muted d-block mb-1">
                    6 years · February 2024 · Stayed one night
                </small>

                <p class="mb-0">
                    Amazing location and very comfortable.
                </p>
            </div>
        </div>
    </article>
</section>

</body>
</html>
