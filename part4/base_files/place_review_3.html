<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Place Review 3</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>

<section id="add-review-3" class="mb-5">

    <!-- Title -->
    <div class="mb-4">
        <h2 class="mb-1">Reviews</h2>
        <p class="text-muted mb-2">Sorted by: Most relevant</p>
        <hr class="border-secondary-subtle">
    </div>

    <!-- Review 4 -->
    <article class="review-card py-3 border-bottom border-secondary-subtle">
        <div class="d-flex align-items-start">
            
            <img src="images/profil_4.jpeg" alt="David Hubertus avatar" class="review-avatar me-3 rounded-circle">

            <div class="flex-grow-1">
                <h3 class="mb-1 fw-bold">David Hubertus</h3>

                <div class="mb-2">
                    <i class="bi bi-star-fill text-dark"></i>
                    <i class="bi bi-star-fill text-dark"></i>
                    <i class="bi bi-star-fill text-dark"></i>
                    <i class="bi bi-star-fill text-dark"></i>
                    <i class="bi bi-star-fill text-dark"></i>
                </div>

                <small class="text-muted d-block mb-1">
                    10 years · January 2026 · Stayed one night
                </small>

                <p class="mb-0">
                    A magnificent view, a jacuzzi and a king size bed. I highly recommend this place.
                </p>
            </div>
        </div>
    </article>

</section>
