<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Index</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/icon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>

    <!-- Header -->
    <header>
        <nav class="navbar">
            <!-- Logo -->
            <a href="index.html" class="logo-link">
                <img src="images/logo.png" alt="HBnB Logo" class="logo">
            </a>

            <!-- Bouton login/déconnexion -->
            <a href="login.html" class="login-button" id="auth-button">Login</a>
        </nav>
    </header>

    <main class="container my-5 pt-5">

        <section id="filter" class="hero-section d-flex flex-column flex-md-row justify-content-between align-items-center p-4">
            <h1>Available Places</h1>
            <div class="d-flex align-items-center order-1 order-md-2 mb-2 mb-md-0">
                <label for="price-filter" class="form-label me-2 mb-0">Max Price:</label>
                <select id="price-filter" class="form-select w-auto">
                    <option value="all">All</option>
                    <option value="0-50">Under $50</option>
                    <option value="50-100">$50 - $99</option>
                    <option value="100+">$100 and above</option>
                </select>
            </div>
        </section>
    
        <section id="places-list" class="row g-4 justify-content-center text-center">
            <!-- Cards générées par JS -->
        </section>
    </main>    

        <!-- Footer -->
        <footer>
            <p class="mb-0">&copy; 2024 HBnB Evolution. All rights reserved.</p>
        </footer>

    <script src="scripts.js"></script>
</body>
</html>
