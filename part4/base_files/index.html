<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Index</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Header -->
    <header class="d-flex justify-content-between align-items-center p-3 bg-light border-bottom fixed-top">
        <a href="index.html">
            <img src="images/logo.png" alt="HBnB Logo" style="height:50px;">
        </a>
        <a href="login.html" class="login-button btn btn-rose">Login</a>
    </header>

    <main class="container my-5 pt-5">

        <section id="filter" class="mb-4">
            <h1>Available Places</h1>
            <div class="text-center mb-3">
                <label for="price-filter" class="form-label me-2">Max Price:</label>
                <select id="price-filter" class="form-select w-auto d-inline-block">
                    <option value="10">10</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                    <option value="">All</option>
                </select>
            </div>
        </section>
    
        <section id="places-list" class="row g-4 justify-content-center">
            <!-- Cards générées par JS -->
        </section>
    </main>    

        <!-- Footer -->
        <footer>
            <p class="mb-0">&copy; 2024 HBnB Evolution. All rights reserved.</p>
        </footer>

    <script src="scripts.js"></script>
</body>
</html>
