<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Add Review</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/icon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    </head>
<body>

    <!-- Header -->
    <header>
        <nav class="navbar">
            <!-- Logo -->
            <a href="index.html" class="logo-link">
                <img src="images/logo.png" alt="HBnB Logo" class="logo">
            </a>

            <!-- Bouton login/déconnexion -->
            <a href="login.html" class="login-button" id="auth-button">Login</a>
        </nav>
    </header>

    <!-- Main content -->
    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-8">
                <div class="card p-4 shadow-sm">

                    <!-- Place identifier -->
                    <h2 class="card-title mb-4 text-center">Reviewing: Beautiful Beach House</h2>
                    <h3 class="card-title mb-4 text-center">Add a review</h3>

                    <!-- Add Review Form -->
                    <form id="review-form">
                        <div class="mb-3">
                            <label for="review" class="form-label">Your Review:</label>
                            <textarea id="review" name="review" class="form-control" rows="4" required></textarea>
                        </div>

                        <div class="mb-3">
                            <label for="rating" class="form-label">Rating:</label>
                            <select id="rating" name="rating" class="form-select" required>
                                <option value="">Select rating</option>
                                <option value="1">1 Star</option>
                                <option value="2">2 Stars</option>
                                <option value="3">3 Stars</option>
                                <option value="4">4 Stars</option>
                                <option value="5">5 Stars</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-rose w-100">Submit Review</button>
                    </form>

                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p class="mb-0">&copy; 2024 HBnB Evolution. All rights reserved.</p>
    </footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- JS -->
    <script src="place.js"></script>
</body>
</html>
