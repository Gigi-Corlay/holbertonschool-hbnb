<section id="reviews" class="mb-5">

    <!-- Title -->
    <div class="mb-4">
        <h2 class="mb-1">Reviews</h2>
        <p class="text-muted mb-2">Ordre de tri des évaluations : Les plus pertinents</p>
        <hr class="border-secondary-subtle">
    </div>

    <!-- Review -->
    <article class="review-card py-3 border-bottom border-secondary-subtle">
        <div class="d-flex align-items-start">
            
            <!-- Avatar -->
            <img src="images/user.png" class="review-avatar me-3">

            <div class="flex-grow-1">
                <h6 class="mb-1 fw-bold">Jane Smith</h6>

                <!-- Stars -->
                <div class="mb-2">
                    <i class="bi bi-star-fill text-dark"></i>
                    <i class="bi bi-star-fill text-dark"></i>
                    <i class="bi bi-star-fill text-dark"></i>
                    <i class="bi bi-star-fill text-secondary"></i>
                    <i class="bi bi-star text-dark"></i>
                </div>

                <p class="mb-0">Great place to stay!</p>
            </div>

        </div>
    </article>

    <!-- Review -->
    <article class="review-card py-3 border-bottom border-secondary-subtle">
        <div class="d-flex align-items-start">
            
            <img src="images/user.png" class="review-avatar me-3">

            <div class="flex-grow-1">
                <h6 class="mb-1 fw-bold">Robert Brown</h6>

                <div class="mb-2">
                    <i class="bi bi-star-fill text-secondary"></i>
                    <i class="bi bi-star-fill text-secondary"></i>
                    <i class="bi bi-star-fill text-secondary"></i>
                    <i class="bi bi-star-fill text-secondary"></i>
                    <i class="bi bi-star-fill text-secondary"></i>
                </div>

                <p class="mb-0">Amazing location and very comfortable.</p>
            </div>

        </div>
    </article>

</section>


<!-- Add Review -->
<section id="add-review" class="mb-5">
    <h3 class="mb-3">Add a Review</h3>

    <div class="border rounded p-4">
        <form id="review-form">

            <div class="mb-3">
                <label class="form-label">Review</label>
                <textarea id="review-text" class="form-control" rows="4"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Rating</label>
                <select id="rating" class="form-select">
                    <option value="">Select rating</option>
                    <option value="1">1 Star</option>
                    <option value="2">2 Stars</option>
                    <option value="3">3 Stars</option>
                    <option value="4">4 Stars</option>
                    <option value="5">5 Stars</option>
                </select>
            </div>

            <button type="submit" class="btn btn-rose w-100">
                Submit Review
            </button>

        </form>
    </div>
</section>
