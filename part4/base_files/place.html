<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Index</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/icon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>

    <!-- Header -->
    <header>
        <nav class="navbar">
            <!-- Logo -->
            <a href="index.html" class="logo-link">
                <img src="images/logo.png" alt="HBnB Logo" class="logo">
            </a>

            <!-- Login/Logout button -->
            <a href="login.html" class="login-button" id="auth-button">Login</a>
        </nav>
    </header>

    <!-- Main content -->
    <main class="container my-5 pt-5">

        <!-- Section: Place Details -->
        <section id="place-details" aria-label="Place Details">
            <h2 class="visually-hidden">Place Details</h2>
            <!-- Content generated by JS -->
        </section>

        <!-- Section: Reviews -->
        <section id="reviews-container" aria-label="Reviews">
            <h2 class="visually-hidden">Reviews</h2>
            <!-- Content generated by JS -->
        </section>

        <!-- Section: Add Review -->
        <section id="add-review-container" aria-label="Add a Review">
            <h2 class="visually-hidden">Add a Review</h2>
            <!-- Content generated by JS -->
        </section>

    </main>

    <!-- Footer -->
    <footer>
        <p class="mb-0">&copy; 2024 HBnB Evolution. All rights reserved.</p>
    </footer>

    <!-- Scripts -->
    <script src="place.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
