<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>HBnB - Place</title>
        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="styles.css">
        <link rel="icon" href="images/icon.png">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    </head>
<body>

    <!-- Header -->
    <header class="d-flex justify-content-between align-items-center p-3 bg-light border-bottom fixed-top">
        <a href="index.html">
            <img src="images/logo.png" alt="HBnB Logo" class="logo" style="height:50px;">
        </a>
        <a href="login.html" class="login-button btn btn-rose">Login</a>
    </header>

    <!-- Main content -->
    <main class="container my-5 pt-5">
        <!-- Détails de la place -->
        <section id="place-details" class="mb-4">
            <!-- Rempli dynamiquement par JS -->
        </section>

        <!-- Reviews -->
        <section id="reviews">
            <!-- Rempli dynamiquement par JS -->
        </section>

        <!-- Add Review Section -->
        <section id="add-review" class="mb-8" style="display:none;">
            <div class="row justify-content-start">
                <div class="col-md-12 col-lg-12">

                    <!-- Place identifier (rempli dynamiquement) -->
                    <h3 class="mb-8 text-start">Add a Review</h3>

                    <!-- Add Review Form -->
                    <form id="review-form" class="px-0">
                        <div class="mb-8">
                            <label for="review-text" class="form-label">Your Review:</label>
                            <textarea id="review-text" name="review-text" class="form-control text-start review-textarea" rows="4" required></textarea>
                        </div>

                        <div class="mb-8">
                            <label for="rating" class="form-label">Rating:</label>
                            <select id="rating" name="rating" class="form-select text-start" required>
                                <option value="">Select rating</option>
                                <option value="1">1 Star</option>
                                <option value="2">2 Stars</option>
                                <option value="3">3 Stars</option>
                                <option value="4">4 Stars</option>
                                <option value="5">5 Stars</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-rose text-center w-100">Submit Review</button>
                    </form>

                </div>
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer>
        <p class="mb-0">&copy; 2024 HBnB Evolution. All rights reserved.</p>
    </footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts.js"></script>
</body>
</html>
